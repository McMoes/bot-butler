{% extends 'base.html' %}
{% load i18n %}

{% block title %}{% trans "Login - Bot Butler" %}{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="glass-card auth-card">
        <h2>{% trans "Welcome Back" %}</h2>
        <form method="post" class="auth-form" {% if request.GET.next %}action="?next={{ request.GET.next }}"{% endif %}>
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn-primary">{% trans "Login" %}</button>
        </form>
        <div class="auth-footer">
            {% trans "Don't have an account?" %} 
            <a href="{% url 'pages:register' %}{% if request.GET.next %}?next={{ request.GET.next }}{% endif %}">{% trans "Register here" %}</a>
        </div>
    </div>
</div>
{% endblock %}
