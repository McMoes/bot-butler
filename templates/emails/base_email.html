<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #0d1117;
            color: #c9d1d9;
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 600px;
            margin: 40px auto;
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }
        .header {
            background: linear-gradient(135deg, #1f2937 0%, #0d1117 100%);
            padding: 30px 20px;
            text-align: center;
            border-bottom: 1px solid #30363d;
        }
        .header h1 {
            margin: 0;
            color: #fff;
            font-size: 24px;
            letter-spacing: 1px;
        }
        .header .gradient-text {
            background: linear-gradient(to right, #8b5cf6, #2dd4bf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .content {
            padding: 30px 20px;
            color: #c9d1d9;
        }
        .footer {
            background-color: #0d1117;
            padding: 20px;
            text-align: center;
            font-size: 12px;
            color: #8b949e;
            border-top: 1px solid #30363d;
        }
        .btn-primary {
            display: inline-block;
            background: linear-gradient(135deg, #8b5cf6 0%, #6d28d9 100%);
            color: #ffffff !important;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            margin-top: 20px;
            text-align: center;
        }
        .data-box {
            background-color: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 15px;
            margin: 20px 0;
        }
        .data-box p {
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <!-- As fallback for missing images, using pure text with inline styles for the brand name -->
            <h1>Bot <span class="gradient-text" style="color: #2dd4bf;">Butler</span></h1>
        </div>
        
        <div class="content">
            {% block content %}{% endblock %}
        </div>
        
        <div class="footer">
            <p>&copy; {% now "Y" %} Bot Butler. All rights reserved.</p>
            <p>You received this email because of your transaction with Bot Butler.</p>
            <p>Bot Butler AI & Automation Services</p>
        </div>
    </div>
</body>
</html>
