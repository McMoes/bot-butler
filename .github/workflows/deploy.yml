name: Deploy to Ubuntu Server

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e

            # Setup Swapfile to prevent OOM (Status 137) during heavy Docker ops
            if ! sudo swapon --show | grep -q 'swapfile'; then
              sudo fallocate -l 2G /swapfile || sudo dd if=/dev/zero of=/swapfile bs=1M count=2048
              sudo chmod 600 /swapfile
              sudo mkswap /swapfile
              sudo swapon /swapfile || true
            fi

            cd /var/www/bot_butler || git clone git@github.com:${{ github.repository }}.git /var/www/bot_butler
            cd /var/www/bot_butler
            git fetch origin main
            git reset --hard origin/main

            # Build production containers
            docker-compose -f docker-compose.prod.yml build

            # STOP old containers to free up RAM before running heavy management commands
            docker-compose -f docker-compose.prod.yml down

            # Run migrations in a temporary container
            docker-compose -f docker-compose.prod.yml run --rm web python manage.py migrate --noinput

            # Collect Static in a temporary container
            docker-compose -f docker-compose.prod.yml run --rm web python manage.py collectstatic --noinput

            # Start production containers (Gunicorn) with fresh code
            docker-compose -f docker-compose.prod.yml up -d

            # Clean up old images
            docker image prune -a -f
